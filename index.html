<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="LibraryOS"/>
<meta name="theme-color" content="#1a2235"/>
<title>LibraryOS</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a2235;--navy2:#212d42;--navy3:#2a3650;
  --card:#ffffff;--card2:#f3f5f9;--card3:#e8ecf4;
  --txt:#1a2235;--txt2:#5a6580;--txt3:#9aa3b8;
  --accent:#4f8ef7;--accent2:#3a75e0;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-light:#81c784;
  --red:#c62828;--red-bg:#ffebee;--red-light:#ef9a9a;
  --amber:#e65100;--amber-bg:#fff3e0;
  --r:10px;--r2:16px;--r3:20px;
  --shadow:0 2px 12px rgba(26,34,53,.10);
  --shadow2:0 4px 24px rgba(26,34,53,.15);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--card2);
  color:var(--txt);
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ══ SPLASH ══ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  transition:opacity .4s;
}
#splash.hide{opacity:0;pointer-events:none}
.splash-icon{font-size:52px;animation:bounce .6s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.splash-name{color:#fff;font-size:22px;font-weight:700;letter-spacing:-.3px}
.splash-sub{color:#7a90b8;font-size:13px}

/* ══ TOPBAR ══ */
.topbar{
  background:var(--navy);
  color:#fff;
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow2);
}
.topbar-logo{font-size:18px;font-weight:700;letter-spacing:-.3px;flex:1}
.topbar-month{font-size:11px;color:#7a90b8;background:var(--navy3);border-radius:20px;padding:4px 11px}
.topbar-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--r);padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.topbar-btn:active{opacity:.8}

/* ══ TABS (bottom nav) ══ */
.bottom-nav{
  background:var(--navy);
  display:flex;
  border-top:1px solid var(--navy3);
  padding-bottom:var(--safe-bot);
  position:sticky;bottom:0;z-index:100;
}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:#7a90b8;font-size:10px;font-weight:500;transition:color .15s}
.bn-item.active{color:var(--accent)}
.bn-icon{font-size:20px;line-height:1}
.bn-label{font-size:10px}

/* ══ MAIN SCROLL ══ */
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ══ LIBRARY PICKER ══ */
.lib-bar{
  background:var(--navy2);
  padding:0 12px;
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--navy3);
}
.lib-bar::-webkit-scrollbar{display:none}
.lib-pill{
  padding:9px 14px;white-space:nowrap;font-size:13px;color:#7a90b8;
  border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;flex-shrink:0;font-weight:500;
}
.lib-pill.active{color:var(--accent);border-bottom-color:var(--accent)}
.lib-pill-add{padding:9px 12px;color:#7a90b8;font-size:18px;border:none;background:none;cursor:pointer;flex-shrink:0}

/* ══ CONTENT ══ */
.page{padding:14px 14px 20px;display:none}
.page.visible{display:block}

/* ══ STATS CARDS ══ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--r2);padding:14px;box-shadow:var(--shadow)}
.stat-card .sl{font-size:11px;color:var(--txt2);font-weight:600;letter-spacing:.5px;margin-bottom:6px}
.stat-card .sv{font-size:28px;font-weight:700;letter-spacing:-.5px;color:var(--txt)}
.stat-card.red{background:var(--red-bg)}
.stat-card.red .sl{color:var(--red)}
.stat-card.red .sv{color:var(--red)}
.stat-card.green{background:var(--green-bg)}
.stat-card.green .sl{color:var(--green)}
.stat-card.green .sv{color:var(--green)}

/* ══ SECTION HEADER ══ */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:14px;font-weight:700;color:var(--txt)}
.sec-badge{font-size:11px;background:var(--card3);color:var(--txt2);padding:2px 8px;border-radius:20px;font-weight:600}

/* ══ SEAT MAP ══ */
.legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px}
.seat{
  border-radius:var(--r2);padding:10px 4px 8px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;border:1.5px solid;text-align:center;
  transition:transform .12s,box-shadow .12s;
  user-select:none;position:relative;
  min-height:72px;justify-content:center;
}
.seat:active{transform:scale(.94)}
.seat.emp{background:#f8f9fc;border-color:#dde2f0;color:var(--txt3)}
.seat.paid{background:var(--green-bg);border-color:var(--green-light);color:var(--green)}
.seat.unpaid{background:var(--red-bg);border-color:var(--red-light);color:var(--red)}
.seat-num{font-size:13px;font-weight:700}
.seat-name{font-size:9px;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.9}
.seat-status{font-size:8px;opacity:.75}
.seat-dot{
  position:absolute;top:5px;right:5px;
  width:7px;height:7px;border-radius:50%;
}
.seat.paid .seat-dot{background:var(--green)}
.seat.unpaid .seat-dot{background:var(--red)}

/* ══ EMPTY SEATS ══ */
.empty-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.empty-card{
  background:var(--card);border-radius:var(--r2);border:1.5px dashed #c0c8de;
  padding:14px 8px;text-align:center;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.empty-card:active{background:var(--card3)}
.empty-card .en{font-size:14px;font-weight:700;color:var(--accent)}
.empty-card .el{font-size:10px;color:var(--txt3);margin-top:2px}

/* ══ STUDENT LIST ══ */
.stu-card{
  background:var(--card);border-radius:var(--r2);
  padding:14px;margin-bottom:10px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:background .12s;
}
.stu-card:active{background:var(--card3)}
.stu-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0;
}
.stu-info{flex:1;min-width:0}
.stu-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stu-meta{font-size:11px;color:var(--txt3);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0}
.badge.paid{background:var(--green-bg);color:var(--green)}
.badge.unpaid{background:var(--red-bg);color:var(--red)}
.badge.empty{background:var(--card3);color:var(--txt2)}

/* ══ FEE REPORT ══ */
.fee-row{
  background:var(--card);border-radius:var(--r2);padding:13px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);cursor:pointer;transition:background .12s;
}
.fee-row:active{background:var(--card3)}
.fee-seat{font-size:13px;font-weight:700;background:var(--card3);border-radius:var(--r);padding:5px 9px;min-width:46px;text-align:center}
.fee-info{flex:1}
.fee-name{font-size:13px;font-weight:600}
.fee-amt{font-size:11px;color:var(--txt3);margin-top:1px}

/* ══ EMPTY STATE ══ */
.empty-state{text-align:center;padding:50px 20px}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:600;margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--txt2);max-width:260px;margin:0 auto 16px}

/* ══ WELCOME ══ */
.welcome{padding:30px 20px;text-align:center}
.welcome .wi{font-size:56px;margin-bottom:16px}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:8px}
.welcome p{font-size:14px;color:var(--txt2);margin-bottom:24px;line-height:1.6}

/* ══ BUTTONS ══ */
.btn{
  padding:11px 18px;border-radius:var(--r2);font-size:14px;font-weight:600;
  cursor:pointer;border:none;transition:opacity .12s,transform .08s;
  display:inline-flex;align-items:center;gap:6px;font-family:inherit;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn.primary{background:var(--accent);color:#fff}
.btn.secondary{background:var(--card3);color:var(--txt)}
.btn.danger{background:var(--red-bg);color:var(--red)}
.btn.success{background:var(--green-bg);color:var(--green)}
.btn.full{width:100%;justify-content:center}
.btn.sm{padding:8px 14px;font-size:13px;border-radius:var(--r)}

/* ══ MODAL ══ */
.overlay{
  position:fixed;inset:0;background:rgba(15,20,35,.55);
  z-index:500;display:flex;align-items:flex-end;
  animation:overin .2s;
}
@keyframes overin{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--card);
  border-radius:var(--r3) var(--r3) 0 0;
  width:100%;max-height:92dvh;overflow-y:auto;
  padding:0 0 calc(var(--safe-bot) + 16px);
  animation:sheetin .22s cubic-bezier(.34,1.2,.64,1);
}
@keyframes sheetin{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{width:36px;height:4px;background:#dde2f0;border-radius:2px;margin:12px auto 0}
.sheet-hdr{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between}
.sheet-title{font-size:17px;font-weight:700;letter-spacing:-.2px}
.sheet-close{background:var(--card3);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--txt2)}
.sheet-body{padding:4px 18px 10px}
.sheet-footer{padding:10px 18px 0;display:flex;gap:10px}

/* ══ FORM ══ */
.fgrp{margin-bottom:14px}
.fgrp label{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px;letter-spacing:.3px}
.fgrp input,.fgrp select{
  width:100%;padding:12px 14px;
  border:1.5px solid #dde2f0;border-radius:var(--r2);
  font-size:14px;background:var(--card);color:var(--txt);
  font-family:inherit;outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
.fgrp input:focus,.fgrp select:focus{border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ══ DETAIL ROWS ══ */
.detail-box{background:var(--card2);border-radius:var(--r2);padding:4px 14px;margin-bottom:14px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #e8ecf4;font-size:13px}
.drow:last-child{border-bottom:none}
.dl{color:var(--txt2);font-weight:500}
.dr{font-weight:600;text-align:right;max-width:60%;word-break:break-word}

/* ══ PAY HISTORY ══ */
.pay-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:10px}
.pay-item{display:flex;justify-content:space-between;align-items:center;background:var(--green-bg);border-radius:var(--r);padding:8px 12px;font-size:12px}
.pay-month{color:var(--green);font-weight:600}
.pay-date{color:var(--txt3)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:calc(var(--safe-bot) + 70px);left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:10px 20px;
  border-radius:20px;font-size:13px;font-weight:500;
  z-index:9000;white-space:nowrap;
  animation:toastin .25s,toastout .3s 1.8s forwards;
  box-shadow:var(--shadow2);
}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastout{to{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* ══ DIVIDER ══ */
.divider{border:none;border-top:1px solid #e8ecf4;margin:12px 0}

/* ══ TOGGLE ══ */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-label{font-size:13px;color:var(--txt2);font-weight:500}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:13px;transition:.3s;cursor:pointer}
.toggle-slider:before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}

/* ══ COLORS ══ */
.c-blue{background:#e8f0fe;color:#1a56db}
.c-purple{background:#f0ebff;color:#7c3aed}
.c-orange{background:#fff3e0;color:#c2410c}
.c-teal{background:#e0f7fa;color:#0f766e}
.c-pink{background:#fce7f3;color:#be185d}
.c-green{background:var(--green-bg);color:var(--green)}

/* ══ SCROLL CHIP BAR ══ */
.chip-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.chip-bar::-webkit-scrollbar{display:none}
.chip{padding:7px 15px;border-radius:20px;background:var(--card);border:1.5px solid #dde2f0;font-size:12px;font-weight:600;color:var(--txt2);white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ══ INSTALL BANNER ══ */
#install-banner{
  display:none;background:var(--accent);color:#fff;
  padding:10px 16px;font-size:13px;
  display:none;align-items:center;gap:10px;
}
#install-banner.show{display:flex}
#install-banner button{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:var(--r);padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}

.search-box{
  background:var(--card);border:1.5px solid #dde2f0;border-radius:var(--r2);
  padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.search-box input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--txt);font-family:inherit}
.search-icon{color:var(--txt3);font-size:16px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">📚</div>
  <div class="splash-name">LibraryOS</div>
  <div class="splash-sub">Seat & Fee Manager</div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  📲 Install LibraryOS on your home screen for quick access!
  <button id="install-btn">Install</button>
  <button onclick="document.getElementById('install-banner').classList.remove('show')" style="background:transparent;font-size:18px;padding:0 4px">×</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">📚 LibraryOS</div>
  <div class="topbar-month" id="top-month"></div>
  <button class="topbar-btn" onclick="UI.openSheet('add-lib',{})">＋ Library</button>
</div>

<!-- LIBRARY PILLS -->
<div class="lib-bar" id="lib-bar">
  <button class="lib-pill-add" onclick="UI.openSheet('add-lib',{})">＋</button>
</div>

<!-- MAIN APP SCROLL -->
<div id="app">
  <div id="page-seats" class="page"></div>
  <div id="page-students" class="page"></div>
  <div id="page-empty" class="page"></div>
  <div id="page-fees" class="page"></div>
  <div id="page-none" class="page visible">
    <div class="welcome">
      <div class="wi">📚</div>
      <h2>Welcome to LibraryOS</h2>
      <p>Manage multiple library branches, assign students to fixed seats, and track monthly fees — all in one app.</p>
      <button class="btn primary" onclick="UI.openSheet('add-lib',{})">＋ Create First Library</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="bn-item active" onclick="App.setTab('seats',this)">
    <div class="bn-icon">🪑</div><div class="bn-label">Seats</div>
  </button>
  <button class="bn-item" onclick="App.setTab('students',this)">
    <div class="bn-icon">👥</div><div class="bn-label">Students</div>
  </button>
  <button class="bn-item" onclick="App.setTab('empty',this)">
    <div class="bn-icon">⭕</div><div class="bn-label">Empty</div>
  </button>
  <button class="bn-item" onclick="App.setTab('fees',this)">
    <div class="bn-icon">💰</div><div class="bn-label">Fees</div>
  </button>
</nav>

<!-- SHEET ROOT -->
<div id="sheet-root"></div>
<!-- TOAST ROOT -->
<div id="toast-root"></div>

<script>
// ═══════════════════════════════
//  STATE & PERSISTENCE
// ═══════════════════════════════
const S = {
  libs: [], students: [], pays: [],
  sel: null, tab: 'seats',
  // pending action for confirm sheet
  _pendingAction: null
};

const DB = {
  save() {
    try {
      localStorage.setItem('los:libs', JSON.stringify(S.libs));
      localStorage.setItem('los:stus', JSON.stringify(S.students));
      localStorage.setItem('los:pays', JSON.stringify(S.pays));
    } catch(e){}
  },
  load() {
    try { S.libs = JSON.parse(localStorage.getItem('los:libs')||'[]'); } catch(e){ S.libs=[]; }
    try { S.students = JSON.parse(localStorage.getItem('los:stus')||'[]'); } catch(e){ S.students=[]; }
    try { S.pays = JSON.parse(localStorage.getItem('los:pays')||'[]'); } catch(e){ S.pays=[]; }
    if (S.libs.length) S.sel = S.libs[0].id;
  }
};

// ═══════════════════════════════
//  HELPERS
// ═══════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const cm  = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const fmm = m => { if(!m) return ''; const [y,mo]=m.split('-'); return new Date(+y,+mo-1).toLocaleString('default',{month:'long',year:'numeric'}); };
const today = () => new Date().toLocaleDateString('en-IN');
const initials = name => (name||'').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
const avatarColors = ['c-blue','c-purple','c-orange','c-teal','c-pink','c-green'];
const avatarColor = name => avatarColors[name.charCodeAt(0)%avatarColors.length] || 'c-blue';

// ── seat status (FIXED: checks active flag properly) ──
function seatStatus(lid, seatNum) {
  const stu = S.students.find(s => s.lid === lid && s.seat === seatNum && s.active === true);
  if (!stu) return { st: 'emp', stu: null };
  const paid = S.pays.some(p => p.sid === stu.id && p.month === cm());
  return { st: paid ? 'paid' : 'unpaid', stu };
}

// ── vacancy check: is seat truly free? ──
function isSeatFree(lid, seatNum) {
  return seatStatus(lid, seatNum).st === 'emp';
}

function getStats(lid) {
  const lib = S.libs.find(l => l.id === lid);
  if (!lib) return { total:0, occ:0, empty:0, paid:0, unpaid:0 };
  let occ=0, paid=0, unpaid=0;
  for (let i=1; i<=lib.seats; i++) {
    const { st } = seatStatus(lid, i);
    if (st==='paid')   { occ++; paid++;   }
    if (st==='unpaid') { occ++; unpaid++; }
  }
  return { total:lib.seats, occ, empty:lib.seats-occ, paid, unpaid };
}

function getLib() { return S.sel ? S.libs.find(l=>l.id===S.sel) : null; }

// ═══════════════════════════════

// ═══════════════════════════════
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

const R = {
  all() { this.libBar(); this.page(); },

  libBar() {
    const bar = document.getElementById('lib-bar');
    const pills = S.libs.map(l =>
      `<button class="lib-pill${S.sel===l.id?' active':''}" onclick="App.selLib('${l.id}')">${esc(l.name)}</button>`
    ).join('');
    bar.innerHTML = pills + `<button class="lib-pill-add" onclick="UI.openSheet('add-lib',{})">＋</button>`;
  },

  page() {
    const noLib = !S.sel || !S.libs.length;
    document.getElementById('page-none').className = 'page' + (noLib?' visible':'');
    document.getElementById('bottom-nav').style.display = noLib ? 'none' : 'flex';

    const pages = ['seats','students','empty','fees'];
    pages.forEach(p => {
      document.getElementById('page-'+p).className = 'page' + (!noLib && S.tab===p?' visible':'');
    });

    if (noLib) return;
    const lib = getLib(); if (!lib) return;
    const st = getStats(lib.id);
    this.updateNavBadges(st);

    if (S.tab==='seats')    this.seats(lib, st);
    if (S.tab==='students') this.students(lib, st);
    if (S.tab==='empty')    this.empty(lib, st);
    if (S.tab==='fees')     this.fees(lib, st);
  },

  updateNavBadges(st) {
    const btns = document.querySelectorAll('.bn-item');
    if (btns[2]) btns[2].querySelector('.bn-label').textContent = `Empty(${st.empty})`;
    if (btns[3]) btns[3].querySelector('.bn-label').textContent = `Fees(${st.unpaid>0?'⚠️':'✓'})`;
  },

  seats(lib, st) {
    const seats = Array.from({length: lib.seats}, (_, i) => {
      const n = i+1;
      const { st: s, stu } = seatStatus(lib.id, n);
      const name = stu ? `<div class="seat-name">${esc(stu.name.split(' ')[0])}</div>` : `<div class="seat-status">Tap to assign</div>`;
      const status = stu ? `<div class="seat-status">${s==='paid'?'✓ Paid':'✗ Unpaid'}</div>` : '';
      const dot = stu ? `<div class="seat-dot"></div>` : '';
      return `<div class="seat ${s}" onclick="App.clickSeat('${lib.id}',${n},'${s}')">
        ${dot}
        <div class="seat-num">S-${n}</div>${name}${status}
      </div>`;
    }).join('');

    document.getElementById('page-seats').innerHTML = `
      <div style="margin-bottom:14px">
        <div style="font-size:18px;font-weight:700;letter-spacing:-.3px">${esc(lib.name)}</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">₹${lib.fee.toLocaleString('en-IN')}/month · ${lib.seats} seats
          <button onclick="UI.openSheet('edit-lib','${lib.id}')" style="background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;margin-left:8px">Edit</button>
          <button onclick="App.deleteLib('${lib.id}')" style="background:none;border:none;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;margin-left:6px">Delete</button>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="sl">TOTAL SEATS</div><div class="sv">${st.total}</div></div>
        <div class="stat-card"><div class="sl">OCCUPIED</div><div class="sv">${st.occ}</div></div>
        <div class="stat-card ${st.empty>0?'':'green'}"><div class="sl">AVAILABLE</div><div class="sv">${st.empty}</div></div>
        <div class="stat-card ${st.unpaid>0?'red':'green'}"><div class="sl">UNPAID</div><div class="sv">${st.unpaid}</div></div>
      </div>
      <div class="sec-hdr"><div class="sec-title">Seat Map</div></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#e8ecf4;border:1px solid #c0c8de"></div>Empty</div>
        <div class="leg"><div class="leg-dot" style="background:#e8f5e9;border:1px solid #81c784"></div>Fee Paid</div>
        <div class="leg"><div class="leg-dot" style="background:#ffebee;border:1px solid #ef9a9a"></div>Fee Unpaid</div>
      </div>
      <div class="seat-grid">${seats}</div>
    `;
  },

  students(lib, st) {
    const stus = S.students.filter(s => s.lid===lib.id && s.active===true)
                            .sort((a,b) => a.seat-b.seat);

    if (!stus.length) {
      document.getElementById('page-students').innerHTML = `<div class="empty-state">
        <div class="ei">👤</div><h3>No students yet</h3>
        <p>Go to Seat Map and tap any empty seat to register a student.</p>
      </div>`;
      return;
    }

    const rows = stus.map(s => {
      const paid = S.pays.some(p=>p.sid===s.id && p.month===cm());
      return `<div class="stu-card" onclick="App.clickSeat('${lib.id}',${s.seat},'${paid?'paid':'unpaid'}')">
        <div class="stu-avatar ${avatarColor(s.name)}">${esc(initials(s.name))}</div>
        <div class="stu-info">
          <div class="stu-name">${esc(s.name)}</div>
          <div class="stu-meta">S-${s.seat} · ${esc(s.phone||'—')}</div>
        </div>
        <span class="badge ${paid?'paid':'unpaid'}">${paid?'✓ Paid':'✗ Unpaid'}</span>
      </div>`;
    }).join('');

    document.getElementById('page-students').innerHTML = `
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="stu-search" placeholder="Search students…" oninput="R.filterStudents('${lib.id}')"/>
      </div>
      <div id="stu-list">${rows}</div>`;
  },

  filterStudents(lid) {
    const q = (document.getElementById('stu-search')?.value||'').toLowerCase();
    const stus = S.students.filter(s => s.lid===lid && s.active===true)
                            .filter(s => !q || s.name.toLowerCase().includes(q) || (s.phone||'').includes(q))
                            .sort((a,b)=>a.seat-b.seat);
    const paid_map = {};
    stus.forEach(s => { paid_map[s.id] = S.pays.some(p=>p.sid===s.id&&p.month===cm()); });
    document.getElementById('stu-list').innerHTML = stus.map(s => {
      const paid = paid_map[s.id];
      return `<div class="stu-card" onclick="App.clickSeat('${lid}',${s.seat},'${paid?'paid':'unpaid'}')">
        <div class="stu-avatar ${avatarColor(s.name)}">${esc(initials(s.name))}</div>
        <div class="stu-info"><div class="stu-name">${esc(s.name)}</div>
        <div class="stu-meta">S-${s.seat} · ${esc(s.phone||'—')}</div></div>
        <span class="badge ${paid?'paid':'unpaid'}">${paid?'✓ Paid':'✗ Unpaid'}</span>
      </div>`;
    }).join('') || '<div class="empty-state" style="padding:30px 0"><p>No students found.</p></div>';
  },

  empty(lib, st) {
    const emptySeats = [];
    for (let i=1; i<=lib.seats; i++) {
      if (isSeatFree(lib.id, i)) emptySeats.push(i);
    }

    if (!emptySeats.length) {
      document.getElementById('page-empty').innerHTML = `<div class="empty-state">
        <div class="ei">✅</div><h3>Library Full!</h3>
        <p>All ${lib.seats} seats are currently occupied.</p>
      </div>`;
      return;
    }

    const cards = emptySeats.map(n =>
      `<div class="empty-card" onclick="App.clickSeat('${lib.id}',${n},'emp')">
        <div class="en">S-${n}</div>
        <div class="el">Tap to assign</div>
      </div>`
    ).join('');

    document.getElementById('page-empty').innerHTML = `
      <div style="margin-bottom:12px;font-size:13px;color:var(--txt2)">
        <strong>${emptySeats.length}</strong> seat${emptySeats.length!==1?'s':''} available
      </div>
      <div class="empty-grid">${cards}</div>`;
  },

  fees(lib, st) {
    const stus = S.students.filter(s=>s.lid===lib.id && s.active===true);
    if (!stus.length) {
      document.getElementById('page-fees').innerHTML = `<div class="empty-state">
        <div class="ei">💰</div><h3>No students enrolled</h3>
        <p>Register students from the Seat Map to track fees.</p>
      </div>`;
      return;
    }

    const unpaidStus = stus.filter(s=>!S.pays.some(p=>p.sid===s.id&&p.month===cm())).sort((a,b)=>a.seat-b.seat);
    const paidStus = stus.filter(s=> S.pays.some(p=>p.sid===s.id&&p.month===cm())).sort((a,b)=>a.seat-b.seat);
    const collected = paidStus.length * lib.fee;
    const pending = unpaidStus.length * lib.fee;

    const unpaidRows = unpaidStus.map(s=>`<div class="fee-row" onclick="App.clickSeat('${lib.id}',${s.seat},'unpaid')">
      <div class="fee-seat">S-${s.seat}</div>
      <div class="fee-info"><div class="fee-name">${esc(s.name)}</div><div class="fee-amt">${esc(s.phone||'—')}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <span class="badge unpaid">✗ Unpaid</span>
        <span style="font-size:11px;color:var(--red);font-weight:600">₹${lib.fee.toLocaleString('en-IN')}</span>
      </div>
    </div>`).join('');

    const paidRows = paidStus.map(s=>{
      const py = S.pays.find(p=>p.sid===s.id&&p.month===cm());
      return `<div class="fee-row" onclick="App.clickSeat('${lib.id}',${s.seat},'paid')">
        <div class="fee-seat">S-${s.seat}</div>
        <div class="fee-info"><div class="fee-name">${esc(s.name)}</div><div class="fee-amt">Paid on ${esc(py?.paid_on||'—')}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <span class="badge paid">✓ Paid</span>
          <span style="font-size:11px;color:var(--green);font-weight:600">₹${lib.fee.toLocaleString('en-IN')}</span>
        </div>
      </div>`;
    }).join('');

    document.getElementById('page-fees').innerHTML = `
      <div class="stat-grid">
        <div class="stat-card green"><div class="sl">COLLECTED</div><div class="sv" style="font-size:20px">₹${collected.toLocaleString('en-IN')}</div></div>
        <div class="stat-card ${pending>0?'red':'green'}"><div class="sl">PENDING</div><div class="sv" style="font-size:20px">₹${pending.toLocaleString('en-IN')}</div></div>
      </div>
      ${unpaidRows ? `<div class="sec-hdr"><div class="sec-title" style="color:var(--red)">🔴 Unpaid — ${fmm(cm())}</div><div class="sec-badge">${unpaidStus.length}</div></div>${unpaidRows}<hr class="divider">` : ''}
      ${paidRows ? `<div class="sec-hdr"><div class="sec-title" style="color:var(--green)">🟢 Paid — ${fmm(cm())}</div><div class="sec-badge">${paidStus.length}</div></div>${paidRows}` : ''}
    `;
  }
};

const App = {
  selLib(id) { S.sel=id; S.tab='seats'; R.all(); this._setActiveNav(0); },
  setTab(tab, btn) {
    S.tab = tab; R.page();
    document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  },
  _setActiveNav(idx) {
    document.querySelectorAll('.bn-item').forEach((b,i)=>b.classList.toggle('active',i===idx));
  },

  clickSeat(lid, n, st) {
    if (st === 'emp') {
      UI.openSheet('add-stu', { lid, n: +n });
    } else {
      const { stu } = seatStatus(lid, +n);
      if (stu) UI.openSheet('seat-detail', { lid, n: +n, stu });
    }
  },

  // ── FIXED: proper vacate that immediately frees seat ──
  vacateSeat(stuId, lid, seatNum) {
    S._pendingAction = () => {
      const idx = S.students.findIndex(s => s.id === stuId);
      if (idx !== -1) {
        S.students[idx] = { ...S.students[idx], active: false };
      }
      DB.save();
      UI.closeSheet();
      toast(`Seat S-${seatNum} is now available`);
      // Force re-render to immediately show seat as empty
      S.tab = 'seats';
      R.all();
    };
    UI.openSheet('confirm', {
      title: 'Vacate Seat',
      msg: `Remove the student from Seat S-${seatNum}? The seat will immediately become available.`,
      confirmLabel: 'Vacate Seat',
      type: 'danger'
    });
  },

  markPaid(sid, lid, seatNum) {
    const month = cm();
    if (!S.pays.some(p=>p.sid===sid && p.month===month)) {
      S.pays.push({ id: uid(), sid, month, paid_on: today() });
      DB.save();
      toast('Fee marked as paid ✓');
    }
    // Refresh detail sheet
    const { stu } = seatStatus(lid, seatNum);
    if (stu) UI.openSheet('seat-detail', { lid, n: seatNum, stu });
    R.page();
  },

  deleteLib(id) {
    const lib = S.libs.find(l=>l.id===id);
    S._pendingAction = () => {
      const stuIds = S.students.filter(s=>s.lid===id).map(s=>s.id);
      S.libs = S.libs.filter(l=>l.id!==id);
      S.students = S.students.filter(s=>s.lid!==id);
      S.pays = S.pays.filter(p=>!stuIds.includes(p.sid));
      S.sel = S.libs.length ? S.libs[0].id : null;
      DB.save(); UI.closeSheet(); toast('Library deleted'); R.all();
    };
    UI.openSheet('confirm', {
      title: 'Delete Library',
      msg: `Delete "${lib?.name}" and all student & payment records? This cannot be undone.`,
      confirmLabel: 'Delete',
      type: 'danger'
    });
  }
};

  submitEditLib() {
    const id = document.getElementById('m-eid').value;
    const lib = S.libs.find(l=>l.id===id); if(!lib) return;
    lib.name = document.getElementById('m-ln').value.trim()||lib.name;
    lib.seats = parseInt(document.getElementById('m-ls').value)||lib.seats;
    lib.fee = parseInt(document.getElementById('m-lf').value)||0;
    lib.location = document.getElementById('m-la').value.trim();
    this.closeSheet(); DB.save(); toast('Library updated ✓'); R.all();
  },

  submitStu() {
    const name  = document.getElementById('m-sname').value.trim();
    const phone = document.getElementById('m-sph').value.trim();
    const since = document.getElementById('m-sd').value;
    const email = document.getElementById('m-sem').value.trim();
    const course= document.getElementById('m-sco').value.trim();
    const lid   = document.getElementById('m-slid').value;
    const seat  = parseInt(document.getElementById('m-sseat').value);
    const markPaid = document.getElementById('m-spaid').checked;
    if (!name) { document.getElementById('m-sname').focus(); return; }

    // Double-check seat is still free (FIXED: race condition guard)
    if (!isSeatFree(lid, seat)) {
      toast('⚠️ This seat was just taken!');
      this.closeSheet(); R.all(); return;
    }

    const id = uid();
    S.students.push({ id, name, phone, since, email, course, lid, seat, active: true });
    if (markPaid) S.pays.push({ id:uid(), sid:id, month:cm(), paid_on:today() });
    this.closeSheet(); DB.save(); toast(`${name} registered ✓`); R.all();
  }
};

// Expose to global
window.App = App;
window.UI  = UI;

// ═══════════════════════════════
//  KEYBOARD
// ═══════════════════════════════
document.addEventListener('keydown', e => { if(e.key==='Escape') UI.closeSheet(); });

// ═══════════════════════════════
//  PWA INSTALL
// ═══════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
  if (outcome==='accepted') toast('App installed! 🎉');
});
window.addEventListener('appinstalled', () => toast('LibraryOS installed ✓'));

// ═══════════════════════════════
//  SERVICE WORKER
// ═══════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
document.getElementById('top-month').textContent = fmm(cm());
DB.load();
R.all();

// Hide splash
setTimeout(() => {
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(() => splash.remove(), 400);
}, 900);
</script>
